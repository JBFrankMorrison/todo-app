<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Lista de Tareas</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="container">
    <h1>Lista de Tareas</h1>

    <div class="input-group">
      <input type="text" id="tareaInput" placeholder="Escribe una tarea">
      <button onclick="agregarTarea()">Agregar</button>
    </div>

    <div class="filtros">
        <button class="filtro-btn" onclick="filtrar('todas')">Todas</button>
        <button class="filtro-btn" onclick="filtrar('pendientes')">Pendientes</button>
        <button class="filtro-btn" onclick="filtrar('completadas')">Completadas</button>
    </div>

    <p id="contador"></p>

    <ul id="lista"></ul>
  </div>

  <script src="script.js"></script>
</body>


</html>
